# SG Datalytics — Netlify Configuration
# Deploys everything inside /frontend as the public site

[build]
  publish = "frontend"

# Redirect root to marketplace
[[redirects]]
  from = "/"
  to   = "/marketplace.html"
  status = 200

# Clean URLs — allow /explorer to work without .html
[[redirects]]
  from = "/explorer"
  to   = "/explorer.html"
  status = 200

[[redirects]]
  from = "/comparison"
  to   = "/comparison.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
