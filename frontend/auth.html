<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#f0f4f8;--navy2:#e8edf3;--navy3:#dde4ed;--navy4:#cfd8e3;
  --panel:#ffffff;--teal:#00c9a7;--teal-dim:rgba(0,201,167,0.12);
  --teal-dim2:rgba(0,201,167,0.06);
  --amber:#f59e0b;--red:#ef4444;
  --white:#1a2535;--grey1:rgba(15,30,55,0.88);--grey2:rgba(15,30,55,0.60);
  --grey3:rgba(15,30,55,0.38);--grey4:rgba(15,30,55,0.08);
  --grey5:rgba(15,30,55,0.04);--border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);--border-teal:rgba(0,149,122,0.30);
  --r:8px;--r-lg:14px;--r-xl:20px;--nav-h:64px;
  --font-d:'Bebas Neue',sans-serif;--font-b:'IBM Plex Sans',sans-serif;
  --font-m:'IBM Plex Mono',monospace;--ease:0.22s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth;}
body{font-family:var(--font-b);background:var(--navy);color:var(--grey1);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--navy);}::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:4px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);background:rgba(8,15,30,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4vw;}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:auto;}
.nav-mark{width:32px;height:32px;border-radius:6px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-mark svg{width:16px;height:16px;}
.nav-name{font-family:var(--font-d);font-size:18px;letter-spacing:0.08em;color:var(--white);}
.nav-name span{color:var(--teal);}
.nav-links{display:flex;list-style:none;gap:2px;margin-right:28px;}
.nav-links a{font-size:13px;font-weight:400;color:var(--grey2);text-decoration:none;padding:5px 13px;border-radius:5px;transition:color var(--ease),background var(--ease);}
.nav-links a:hover{color:var(--white);background:var(--grey4);}
.nav-actions{display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-b);font-size:13px;font-weight:500;padding:8px 18px;border-radius:var(--r);cursor:pointer;text-decoration:none;border:none;transition:all var(--ease);}
.btn-ghost{background:transparent;color:var(--grey2);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--white);border-color:var(--grey3);}
.btn-teal{background:var(--teal);color:var(--navy);font-weight:600;}
.btn-teal:hover{filter:brightness(1.08);transform:translateY(-1px);}

/* AUTH LAYOUT */
.auth-page{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:calc(var(--nav-h) + 40px) 5vw 60px;
}
.auth-container{
  width:100%;max-width:420px;
}
.auth-header{text-align:center;margin-bottom:36px;}
.auth-header .mark{
  width:48px;height:48px;border-radius:10px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
}
.auth-header .mark svg{width:22px;height:22px;}
.auth-header h1{font-family:var(--font-d);font-size:2rem;color:var(--white);letter-spacing:0.04em;margin-bottom:6px;}
.auth-header p{font-size:14px;color:var(--grey2);font-weight:300;}

/* TABS */
.auth-tabs{display:flex;margin-bottom:28px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.auth-tab{
  flex:1;padding:11px;text-align:center;cursor:pointer;
  font-family:var(--font-m);font-size:12px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--grey3);background:var(--navy2);
  transition:all var(--ease);border:none;
}
.auth-tab.active{color:var(--teal);background:var(--teal-dim2);border-bottom:2px solid var(--teal);}
.auth-tab:not(.active):hover{color:var(--grey1);background:var(--grey5);}

/* FORM */
.auth-card{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:var(--r-xl);padding:32px 28px;
}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.fg label{font-family:var(--font-m);font-size:11px;color:var(--grey3);letter-spacing:0.06em;text-transform:uppercase;}
.fg input{
  font-family:var(--font-b);font-size:13.5px;color:var(--grey1);
  background:var(--navy2);border:1px solid var(--border2);
  border-radius:var(--r);padding:12px 14px;outline:none;
  transition:border-color var(--ease),box-shadow var(--ease);
}
.fg input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,201,167,0.1);}
.fg input::placeholder{color:var(--grey3);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.auth-submit{
  width:100%;padding:13px;font-size:14px;font-weight:600;
  font-family:var(--font-b);border:none;border-radius:var(--r);
  background:var(--teal);color:var(--navy);cursor:pointer;
  transition:all var(--ease);margin-top:8px;
}
.auth-submit:hover{filter:brightness(1.08);transform:translateY(-1px);}
.auth-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;filter:none;}
.auth-divider{
  display:flex;align-items:center;gap:14px;margin:18px 0;
}
.auth-divider::before,.auth-divider::after{
  content:'';flex:1;height:1px;background:var(--border2);
}
.auth-divider span{font-size:11px;color:var(--grey3);font-family:var(--font-m);text-transform:uppercase;letter-spacing:0.08em;}
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px 18px;border-radius:var(--r);border:1px solid var(--border2);
  background:transparent;color:var(--grey1);font-family:var(--font-b);
  font-size:13.5px;font-weight:500;cursor:pointer;transition:all var(--ease);
}
.btn-google:hover{border-color:var(--grey3);background:var(--grey5);}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}
.auth-status{
  text-align:center;margin-top:14px;
  font-family:var(--font-m);font-size:12px;
  min-height:20px;
}
.auth-status.error{color:var(--red);}
.auth-status.success{color:var(--teal);}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--grey3);}
.auth-footer a{color:var(--teal);text-decoration:none;}
.auth-footer a:hover{text-decoration:underline;}
.forgot-link{
  display:block;text-align:right;margin:-8px 0 16px;
  font-size:12px;color:var(--grey3);text-decoration:none;
  transition:color var(--ease);
}
.forgot-link:hover{color:var(--teal);}

/* SIGNED IN STATE */
.auth-profile{text-align:center;display:none;}
.auth-profile .avatar{
  width:64px;height:64px;border-radius:50%;
  background:var(--teal-dim);border:2px solid var(--teal);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-family:var(--font-d);font-size:1.6rem;
  color:var(--teal);letter-spacing:0.04em;
}
.auth-profile h3{font-size:16px;font-weight:600;color:var(--white);margin-bottom:4px;}
.auth-profile .email-display{font-family:var(--font-m);font-size:12px;color:var(--grey3);margin-bottom:24px;}
.auth-profile .btn-signout{
  background:transparent;border:1px solid var(--border2);color:var(--grey2);
  padding:10px 24px;border-radius:var(--r);cursor:pointer;
  font-family:var(--font-b);font-size:13px;transition:all var(--ease);
}
.auth-profile .btn-signout:hover{border-color:var(--red);color:var(--red);}

@media(max-width:640px){
  .nav-links{display:none;}
  .auth-container{max-width:100%;}
  .auth-card{padding:24px 20px;}
  .fg-row{grid-template-columns:1fr;}
}
</style>
</head>

<script>
// ─── Firebase Config ───
// TODO: Replace with your Firebase project config
// 1. Go to https://console.firebase.google.com
// 2. Create a new project (or use an existing one)
// 3. Go to Project Settings → General → Your apps → Add web app
// 4. Copy the firebaseConfig object and paste it below
const firebaseConfig = {
  apiKey: "AIzaSyAIwXzuhYOO4Ua64vzTcum9hJtGsiY4CLk",
  authDomain: "auth-b203a.firebaseapp.com",
  projectId: "auth-b203a",
  storageBucket: "auth-b203a.firebasestorage.app",
  messagingSenderId: "1066148961538",
  appId: "1:1066148961538:web:a2f29d332b2c9200e4b61b",
  measurementId: "G-H5K8LEJ6RC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ─── Tab Switching ───
function switchTab(tab){
  const signinForm = document.getElementById('form-signin');
  const signupForm = document.getElementById('form-signup');
  const tabSI = document.getElementById('tab-signin');
  const tabSU = document.getElementById('tab-signup');
  const title = document.getElementById('auth-title');
  const subtitle = document.getElementById('auth-subtitle');
  const footer = document.getElementById('auth-footer-text');

  // Clear statuses
  document.getElementById('si-status').textContent = '';
  document.getElementById('su-status').textContent = '';

  if(tab === 'signin'){
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    tabSI.classList.add('active');
    tabSU.classList.remove('active');
    title.textContent = 'SIGN IN';
    subtitle.textContent = 'Access your SG Datalytics datasets';
    footer.innerHTML = '<p>Don\'t have an account? <a href="#" onclick="switchTab(\'signup\');return false;">Create one free</a></p>';
  } else {
    signinForm.style.display = 'none';
    signupForm.style.display = 'block';
    tabSI.classList.remove('active');
    tabSU.classList.add('active');
    title.textContent = 'CREATE ACCOUNT';
    subtitle.textContent = 'Start accessing Ghana\'s best datasets';
    footer.innerHTML = '<p>Already have an account? <a href="#" onclick="switchTab(\'signin\');return false;">Sign in</a></p>';
  }
}

// ─── Sign In ───
document.getElementById('signin-form').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('si-email').value;
  const password = document.getElementById('si-password').value;
  const btn = document.getElementById('si-btn');
  const status = document.getElementById('si-status');

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  status.textContent = '';
  status.className = 'auth-status';

  auth.signInWithEmailAndPassword(email, password)
    .then(function(){ /* onAuthStateChanged handles UI */ })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = 'Sign in';
      status.className = 'auth-status error';
      if(err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential'){
        status.textContent = 'Invalid email or password. Please try again.';
      } else if(err.code === 'auth/too-many-requests'){
        status.textContent = 'Too many attempts. Please try again later.';
      } else {
        status.textContent = 'Sign in failed. Please check your details.';
      }
    });
});

// ─── Sign Up ───
document.getElementById('signup-form').addEventListener('submit', function(e){
  e.preventDefault();
  const fname = document.getElementById('su-fname').value;
  const lname = document.getElementById('su-lname').value;
  const email = document.getElementById('su-email').value;
  const password = document.getElementById('su-password').value;
  const confirm = document.getElementById('su-confirm').value;
  const btn = document.getElementById('su-btn');
  const status = document.getElementById('su-status');

  status.textContent = '';
  status.className = 'auth-status';

  if(password !== confirm){
    status.className = 'auth-status error';
    status.textContent = 'Passwords do not match.';
    return;
  }
  if(password.length < 6){
    status.className = 'auth-status error';
    status.textContent = 'Password must be at least 6 characters.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  auth.createUserWithEmailAndPassword(email, password)
    .then(function(cred){
      return cred.user.updateProfile({ displayName: fname + ' ' + lname });
    })
    .then(function(){ /* onAuthStateChanged handles UI */ })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = 'Create account';
      status.className = 'auth-status error';
      if(err.code === 'auth/email-already-in-use'){
        status.textContent = 'This email is already registered. Try signing in.';
      } else if(err.code === 'auth/weak-password'){
        status.textContent = 'Password is too weak. Use at least 6 characters.';
      } else if(err.code === 'auth/invalid-email'){
        status.textContent = 'Please enter a valid email address.';
      } else {
        status.textContent = 'Registration failed. Please try again.';
      }
    });
});

// ─── Forgot Password ───
document.getElementById('forgot-btn').addEventListener('click', function(e){
  e.preventDefault();
  const email = document.getElementById('si-email').value;
  const status = document.getElementById('si-status');

  if(!email){
    status.className = 'auth-status error';
    status.textContent = 'Enter your email above, then click "Forgot password?"';
    return;
  }

  auth.sendPasswordResetEmail(email)
    .then(function(){
      status.className = 'auth-status success';
      status.textContent = 'Password reset email sent. Check your inbox.';
    })
    .catch(function(){
      status.className = 'auth-status error';
      status.textContent = 'Could not send reset email. Check your email address.';
    });
});

// ─── Google Sign In ───
function googleSignIn(){
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(function(){ /* onAuthStateChanged handles UI */ })
    .catch(function(err){
      var status = document.getElementById('si-status');
      if(document.getElementById('form-signup').style.display !== 'none'){
        status = document.getElementById('su-status');
      }
      status.className = 'auth-status error';
      if(err.code === 'auth/popup-closed-by-user'){
        status.textContent = 'Sign-in popup was closed. Please try again.';
      } else if(err.code === 'auth/popup-blocked'){
        status.textContent = 'Popup blocked by browser. Please allow popups and try again.';
      } else {
        status.textContent = 'Google sign-in failed. Please try again.';
      }
    });
}

// ─── Sign Out ───
document.getElementById('signout-btn').addEventListener('click', function(){
  auth.signOut();
});

// ─── Auth State Listener ───
auth.onAuthStateChanged(function(user){
  const signinForm = document.getElementById('form-signin');
  const signupForm = document.getElementById('form-signup');
  const profileView = document.getElementById('profile-view');
  const tabs = document.querySelector('.auth-tabs');
  const title = document.getElementById('auth-title');
  const subtitle = document.getElementById('auth-subtitle');
  const footer = document.getElementById('auth-footer-text');

  if(user){
    // Signed in — show profile
    signinForm.style.display = 'none';
    signupForm.style.display = 'none';
    profileView.style.display = 'block';
    tabs.style.display = 'none';
    footer.style.display = 'none';
    title.textContent = 'WELCOME BACK';
    subtitle.textContent = 'You are signed in to SG Datalytics';

    const name = user.displayName || user.email.split('@')[0];
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-email').textContent = user.email;
    const initials = name.split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().slice(0,2);
    document.getElementById('profile-initials').textContent = initials;
  } else {
    // Signed out — show forms
    profileView.style.display = 'none';
    tabs.style.display = 'flex';
    footer.style.display = 'block';
    switchTab('signin');

    // Reset buttons
    document.getElementById('si-btn').disabled = false;
    document.getElementById('si-btn').textContent = 'Sign in';
    document.getElementById('su-btn').disabled = false;
    document.getElementById('su-btn').textContent = 'Create account';
  }
});
</script>
